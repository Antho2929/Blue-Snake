const { useState, useEffect } = React;

// ─── CONSTANTS ───────────────────────────────────────────────────────────────
const CHECKLIST_ITEMS = [
  { id: "water",     label: "3L d'eau",                  icon: "💧" },
  { id: "shake",     label: "Shake protéine + créatine", icon: "🥤" },

const TROPHIES = [
  { streak: 1,   name: "Artémis",   title: "Déesse de la Chasse",    emoji: "🏹", color: "#60a5fa" },
  { streak: 5,   name: "Hermès",    title: "Messager des Dieux",     emoji: "⚡", color: "#34d399" },
  { streak: 10,  name: "Arès",      title: "Dieu de la Guerre",      emoji: "⚔️", color: "#f87171" },

  { streak: 50,  name: "Athéna",    title: "Déesse de la Sagesse",   emoji: "🦉", color: "#a78bfa" },
  { streak: 75,  name: "Apollon",   title: "Dieu du Soleil",         emoji: "☀️", color: "#fbbf24" },
  { streak: 100, name: "Zeus",      title: "Roi de l'Olympe",        emoji: "⚡", color: "#f59e0b" },
  { streak: 150, name: "Héraclès",  title: "Le Héros Immortel",      emoji: "🦁", color: "#fb923c" },
  { streak: 200, name: "Prométhée", title: "Porteur du Feu Sacré",   emoji: "🔥", color: "#ef4444" },
  { streak: 365, name: "Chronos",   title: "Maître du Temps Infini", emoji: "⏳", color: "#e879f9" },
];

const WORKOUT_TYPES = [
  "Dos / Biceps", "Chest / Triceps / Épaules", "Jambes",
  "Avant-bras / Trapèze", "HIIT", "Course / Marche", "Natation", "Autre"
];

// ─── STORAGE ─────────────────────────────────────────────────────────────────
const STORAGE_KEY = "ac_fitness_v2";
const loadData = () => {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
};
const saveData = (data) => {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
};
const defaultState = () => ({
  streak: 0,
  flameBroken: false,
  lastCompletedDate: null,
  lastCheckedDate: null,
  dailyChecks: {},
  workouts: [],
  weeklyStats: {},
  unlockedTrophies: [],
});

// ─── DATE HELPERS ─────────────────────────────────────────────────────────────
const today = () => new Date().toISOString().split("T")[0];
const getWeekKey = (dateStr) => {
  const d = new Date(dateStr);
  const jan1 = new Date(d.getFullYear(), 0, 1);
  const weekNum = Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  return `${d.getFullYear()}-W${String(weekNum).padStart(2, "0")}`;
};
const formatDate = (dateStr) => {
  if (!dateStr) return "";
  const d = new Date(dateStr + "T12:00:00");
  return d.toLocaleDateString("fr-CA", { weekday: "short", month: "short", day: "numeric" });
};
const daysBetween = (a, b) => {
  if (!a || !b) return null;
  return Math.round((new Date(b) - new Date(a)) / 86400000);
};

// ─── SNAKE LOGO ───────────────────────────────────────────────────────────────

);

// ─── FLAME ────────────────────────────────────────────────────────────────────
const Flame = ({ streak, broken }) => {
  const color1 = broken ? "#93c5fd" : "#f97316";
  const color2 = broken ? "#3b82f6" : "#ef4444";
  const color3 = broken ? "#1d4ed8" : "#fbbf24";
  return (
    <div className="flame-container">
      <svg viewBox="0 0 60 80" className="flame-svg" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id={"fg" + broken} cx="50%" cy="70%" r="60%">
            <stop offset="0%" stopColor={color3} stopOpacity="0.9"/>
            <stop offset="50%" stopColor={color1}/>
            <stop offset="100%" stopColor={color2} stopOpacity="0.8"/>
          </radialGradient>
        </defs>
        <path d="M30 75 C10 70 5 55 10 42 C15 30 20 25 18 12 C25 22 22 32 28 38 C30 28 35 18 32 5 C42 18 45 30 42 42 C50 32 48 22 44 14 C52 28 56 42 50 58 C46 68 38 74 30 75Z"
          fill={"url(#fg" + broken + ")"}/>
        <path d="M30 68 C18 64 16 52 20 42 C24 34 27 30 26 22 C32 30 28 38 32 44 C36 36 38 28 36 18 C42 28 44 40 38 50 C44 42 42 34 40 28 C46 38 48 50 42 60 C39 65 35 68 30 68Z"
          fill={color3} opacity="0.5"/>
      </svg>
      <div className="streak-number" style={{ color: broken ? "#93c5fd" : "#fb923c" }}>{streak}</div>
      <div className="streak-label" style={{ color: broken ? "#60a5fa" : "#fdba74" }}>
        {broken ? "🧊 Brisé" : streak === 0 ? "Commence!" : "🔥 Streak"}
      </div>
    </div>
  );
};

// ─── TROPHY CARD ──────────────────────────────────────────────────────────────
const TrophyCard = ({ trophy, unlocked, current }) => (
  <div className={"trophy-card" + (unlocked ? " unlocked" : " locked") + (current ? " current-trophy" : "")}
    style={unlocked ? { borderColor: trophy.color + "60", boxShadow: "0 0 20px " + trophy.color + "30" } : {}}>
    <div className="trophy-emoji">{unlocked ? trophy.emoji : "🔒"}</div>
    <div className="trophy-name" style={unlocked ? { color: trophy.color } : {}}>{trophy.name}</div>
    <div className="trophy-title">{trophy.title}</div>
    <div className="trophy-streak">{trophy.streak} jours</div>
    {current && <div className="trophy-badge">ACTIF</div>}
  </div>
);

// ─── APP ──────────────────────────────────────────────────────────────────────
function FitnessTracker() {
  const [tab, setTab] = useState("today");
  const [state, setState] = useState(() => loadData() || defaultState());
  const [workoutForm, setWorkoutForm] = useState({ type: WORKOUT_TYPES[0], notes: "", km: "", calories: "", duration: "" });
  const [showAddWorkout, setShowAddWorkout] = useState(false);
  const [selectedWeek, setSelectedWeek] = useState(getWeekKey(today()));
  const [notification, setNotification] = useState(null);
  const [selectedDay, setSelectedDay] = useState(today());

  useEffect(() => { saveData(state); }, [state]);

  const notify = (msg, type = "success") => {
    setNotification({ msg, type });
    setTimeout(() => setNotification(null), 3000);
  };

  const todayChecks = state.dailyChecks[today()] || {};
  const allDone = CHECKLIST_ITEMS.every(i => todayChecks[i.id]);

  const toggleCheck = (id) => {
    const newChecks = { ...todayChecks, [id]: !todayChecks[id] };
    const newDaily = { ...state.dailyChecks, [today()]: newChecks };
    const nowAllDone = CHECKLIST_ITEMS.every(i => newChecks[i.id]);

    setState(prev => {
      let newState = { ...prev, dailyChecks: newDaily };
      if (nowAllDone && prev.lastCompletedDate !== today()) {
        const diff = daysBetween(prev.lastCompletedDate, today());
        let newStreak = prev.streak;
        if (prev.lastCompletedDate === null) { newStreak = 1; }
        else if (diff <= 2) { newStreak = prev.streak + 1; }
        else { newStreak = 1; }

        const newTrophies = [...prev.unlockedTrophies];
        TROPHIES.forEach(t => {
          if (newStreak >= t.streak && !newTrophies.includes(t.streak)) {
            newTrophies.push(t.streak);
            setTimeout(() => notify("🏆 Trophée: " + t.name + " — " + t.title + "!", "trophy"), 500);
          }
        });

        newState = { ...newState, streak: newStreak, flameBroken: false, lastCompletedDate: today(), unlockedTrophies: newTrophies };
        setTimeout(() => notify("✅ Journée complète! Streak +1 🔥"), 100);
      }
      return newState;
    });
  };

  useEffect(() => {
    const t = today();
    if (state.lastCompletedDate && state.lastCheckedDate !== t) {
      const diff = daysBetween(state.lastCompletedDate, t);
      setState(prev => {
        let s = { ...prev, lastCheckedDate: t };
        if (diff === 2 && !prev.flameBroken) s = { ...s, flameBroken: true };
        else if (diff > 2) s = { ...s, streak: 0, flameBroken: false };
        return s;
      });
    }
  }, []);

  const addWorkout = () => {
    if (!workoutForm.type) return;
    const wk = getWeekKey(today());
    const nw = { id: Date.now(), date: today(), ...workoutForm, km: parseFloat(workoutForm.km)||0, calories: parseFloat(workoutForm.calories)||0, duration: parseFloat(workoutForm.duration)||0 };
    const pw = state.weeklyStats[wk] || { km:0, calories:0, sessions:0 };
    setState(prev => ({
      ...prev,
      workouts: [nw, ...prev.workouts],
      weeklyStats: { ...prev.weeklyStats, [wk]: { km: pw.km+nw.km, calories: pw.calories+nw.calories, sessions: (pw.sessions||0)+1 } }
    }));
    setWorkoutForm({ type: WORKOUT_TYPES[0], notes:"", km:"", calories:"", duration:"" });
    setShowAddWorkout(false);
    notify("💪 Séance enregistrée!");
  };

  const currentTrophy = [...TROPHIES].reverse().find(t => state.streak >= t.streak);
  const nextTrophy = TROPHIES.find(t => t.streak > state.streak);
  const currentWeekStats = state.weeklyStats[selectedWeek] || { km:0, calories:0, sessions:0 };
  const allWeeks = Object.keys(state.weeklyStats).sort().slice(-8);
  const dayWorkouts = state.workouts.filter(w => w.date === selectedDay);

  return (
    <div className="app">
      <style>{`

          --text:#e2e8f0;--text2:#94a3b8;--orange:#f97316;--green:#22c55e;
        }
        body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif}
        .app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);overflow-x:hidden}
        .header{background:linear-gradient(180deg,#020c1f 0%,var(--bg2) 100%);padding:20px 20px 0;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
        .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}

        .calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:14px}
        .cal-day-header{font-size:10px;font-weight:700;color:var(--text2);text-align:center;padding:4px 0;letter-spacing:.5px}
        .cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;position:relative;border:1px solid transparent}
        .cal-day.is-today{border-color:var(--blue);color:var(--blue-l)}
        .cal-day.has-workout{background:var(--bg3);color:var(--blue-l)}
        .cal-day.completed{background:#0a2a10;color:#4ade80}
        .cal-day.selected-day{border-color:var(--orange)}
        .cal-dot{position:absolute;bottom:2px;width:4px;height:4px;border-radius:50%;background:var(--blue)}
        .day-detail{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px}
        .day-detail-title{font-family:'Cinzel',serif;font-size:12px;color:var(--blue-l);font-weight:700;letter-spacing:1px;margin-bottom:10px}
        .no-data{color:var(--text2);font-size:13px;text-align:center;padding:10px 0}
        .notification{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--blue);border-radius:10px;padding:12px 20px;font-size:14px;font-weight:700;color:var(--text);z-index:1000;box-shadow:0 4px 20px rgba(59,130,246,.3);animation:slideDown .3s ease;white-space:nowrap}
        .notification.trophy{border-color:var(--orange);box-shadow:0 4px 20px rgba(249,115,22,.4)}
        @keyframes slideDown{from{transform:translateX(-50%) translateY(-20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
        .tab-icon{font-size:16px}
        .intro-box{margin-bottom:16px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;font-size:13px;color:var(--text2);line-height:1.6}
      `}</style>

      {notification && <div className={"notification" + (notification.type === "trophy" ? " trophy" : "")}>{notification.msg}</div>}

      {/* HEADER */}
      <div className="header">
        <div className="header-top">
          <div className="logo-area">
            <SnakeLogo/>
            <div>
              <div className="logo-text">AC</div>
              <div className="logo-sub">Fitness Tracker</div>
            </div>
          </div>
          <Flame streak={state.streak} broken={state.flameBroken}/>
        </div>
        <div className="tabs">
          {[
            { id:"today",   label:"Aujourd'hui", icon:"📋" },
            { id:"log",     label:"Séances",     icon:"🏋️" },
            { id:"stats",   label:"Stats",       icon:"📊" },
            { id:"trophies",label:"Trophées",    icon:"🏆" },
          ].map(t => (
            <button key={t.id} className={"tab-btn" + (tab===t.id?" active":"")} onClick={() => setTab(t.id)}>
              <span className="tab-icon">{t.icon}</span><br/>{t.label}
            </button>
          ))}
        </div>
      </div>

      <div className="content">

        {/* ── AUJOURD'HUI ── */}
        {tab === "today" && (
          <>
            {currentTrophy && (
              <div className="streak-section">
                <Flame streak={state.streak} broken={state.flameBroken}/>
                <div className="streak-right">
                  <div className="current-god" style={{ color: currentTrophy.color }}>{currentTrophy.emoji} {currentTrophy.name}</div>
                  <div className="god-title">{currentTrophy.title}</div>
                  {nextTrophy && (
                    <div className="next-trophy-bar">
                      <div className="next-trophy-label">
                        <span>Prochain: {nextTrophy.name}</span>
                        <span>{state.streak}/{nextTrophy.streak}</span>
                      </div>
                      <div className="progress-bar">
                        <div className="progress-fill" style={{ width: Math.min(100,(state.streak/nextTrophy.streak)*100)+"%" }}/>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            )}

            <div className="card-title" style={{ marginBottom:12 }}>
              📅 {new Date().toLocaleDateString("fr-CA",{weekday:"long",month:"long",day:"numeric"})}
            </div>

            <div className="daily-progress">
              <div className="progress-bar" style={{ flex:1, height:8 }}>
                <div className="progress-fill" style={{ width: (Object.values(todayChecks).filter(Boolean).length/CHECKLIST_ITEMS.length*100)+"%" }}/>
              </div>
              <div className="daily-count">{Object.values(todayChecks).filter(Boolean).length}/{CHECKLIST_ITEMS.length}</div>
            </div>

            {CHECKLIST_ITEMS.map(item => (
              <div key={item.id} className={"check-item"+(todayChecks[item.id]?" done":"")} onClick={() => toggleCheck(item.id)}>
                <div className="check-icon-wrap">{item.icon}</div>
                <div className="check-label">{item.label}</div>
                <div className="check-box">{todayChecks[item.id]?"✓":""}</div>
              </div>
            ))}

            {allDone && (
              <div className="all-done-banner">
                <div className="all-done-emoji">🏆</div>
                <div className="all-done-text">JOURNÉE PARFAITE — STREAK +1!</div>
              </div>
            )}
          </>
        )}

        {/* ── SÉANCES ── */}
        {tab === "log" && (
          <>
            <button className="add-btn" onClick={() => setShowAddWorkout(!showAddWorkout)}>
              {showAddWorkout ? "✕ Annuler" : "+ Enregistrer une séance"}
            </button>

            {showAddWorkout && (
              <div className="workout-form">
                <div className="form-row">
                  <label className="form-label">Type de séance</label>
                  <select className="form-select" value={workoutForm.type} onChange={e => setWorkoutForm(p => ({...p,type:e.target.value}))}>
                    {WORKOUT_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                  </select>
                </div>
                <div className="form-row-2">
                  <div className="form-row">
                    <label className="form-label">⏱ Durée (min)</label>
                    <input className="form-input" type="number" placeholder="45" value={workoutForm.duration} onChange={e => setWorkoutForm(p => ({...p,duration:e.target.value}))}/>
                  </div>
                  <div className="form-row">
                    <label className="form-label">📍 KM</label>
                    <input className="form-input" type="number" placeholder="0" step="0.1" value={workoutForm.km} onChange={e => setWorkoutForm(p => ({...p,km:e.target.value}))}/>
                  </div>
                </div>
                <div className="form-row">
                  <label className="form-label">🔥 Calories</label>
                  <input className="form-input" type="number" placeholder="350" value={workoutForm.calories} onChange={e => setWorkoutForm(p => ({...p,calories:e.target.value}))}/>
                </div>
                <div className="form-row">
                  <label className="form-label">📝 Notes</label>
                  <input className="form-input" type="text" placeholder="Exercices, sensations..." value={workoutForm.notes} onChange={e => setWorkoutForm(p => ({...p,notes:e.target.value}))}/>
                </div>
                <div className="form-btns">
                  <button className="btn-cancel" onClick={() => setShowAddWorkout(false)}>Annuler</button>
                  <button className="btn-save" onClick={addWorkout}>💾 Sauvegarder</button>
                </div>
              </div>
            )}

            {state.workouts.length === 0
              ? <div className="card"><div className="no-data">Aucune séance. Commence!</div></div>
              : state.workouts.map(w => (
                <div key={w.id} className="workout-item">
                  <div className="workout-header">
                    <div className="workout-type">🏋️ {w.type}</div>
                    <div className="workout-date">{formatDate(w.date)}</div>
                  </div>
                  <div className="workout-stats-row">
                    {w.duration>0 && <div className="workout-stat"><div className="val">{w.duration}</div><div className="unit">MIN</div></div>}
                    {w.km>0 && <div className="workout-stat"><div className="val">{w.km}</div><div className="unit">KM</div></div>}
                    {w.calories>0 && <div className="workout-stat"><div className="val">{w.calories}</div><div className="unit">CAL</div></div>}
                  </div>
                  {w.notes && <div className="workout-notes">"{w.notes}"</div>}
                </div>
              ))
            }
          </>
        )}

        {/* ── STATS ── */}
        {tab === "stats" && (
          <>
            <div className="card-title">📊 Semaine en cours</div>
            <div className="stats-week">
              <div className="stat-box"><div className="val">{currentWeekStats.sessions||0}</div><div className="lbl">Séances</div></div>
              <div className="stat-box"><div className="val">{(currentWeekStats.km||0).toFixed(1)}</div><div className="lbl">KM</div></div>
              <div className="stat-box"><div className="val">{currentWeekStats.calories||0}</div><div className="lbl">Calories</div></div>
            </div>

            {allWeeks.length > 0 && (
              <div className="chart-area">
                <div className="card-title">🔥 Calories / Semaine</div>
                <div className="chart-bars">
                  {allWeeks.map(wk => {
                    const ws = state.weeklyStats[wk]||{};
                    const maxCal = Math.max(...allWeeks.map(w => state.weeklyStats[w]?.calories||0), 1);
                    const pct = ((ws.calories||0)/maxCal)*90;
                    return (
                      <div key={wk} className="chart-bar-wrap" onClick={() => setSelectedWeek(wk)}>
                        <div className={"chart-bar"+(selectedWeek===wk?" selected":"")} style={{ height: Math.max(pct,4)+"%" }}/>
                      </div>
                    );
                  })}
                </div>
                <div style={{ display:"flex", gap:6 }}>
                  {allWeeks.map(wk => (
                    <div key={wk} className="chart-week-label">S{wk.split("-W")[1]||""}</div>
                  ))}
                </div>
              </div>
            )}

            <div className="card-title">📅 Calendrier</div>
            {(() => {
              const now = new Date();
              const year = now.getFullYear(), month = now.getMonth();
              const firstDay = new Date(year,month,1).getDay();
              const daysInMonth = new Date(year,month+1,0).getDate();
              const days = [];
              ["Di","Lu","Ma","Me","Je","Ve","Sa"].forEach(d => days.push({type:"header",label:d}));
              for(let i=0;i<firstDay;i++) days.push({type:"empty"});
              for(let d=1;d<=daysInMonth;d++){
                const ds = `${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
                days.push({ type:"day", d, dateStr:ds,
                  hasWorkout: state.workouts.some(w=>w.date===ds),
                  completed: state.dailyChecks[ds] && CHECKLIST_ITEMS.every(i=>state.dailyChecks[ds][i.id]),
                  isToday: ds===today()
                });
              }
              return (
                <div className="calendar-grid">
                  {days.map((day,i) => {
                    if(day.type==="header") return <div key={"h"+i} className="cal-day-header">{day.label}</div>;
                    if(day.type==="empty") return <div key={"e"+i}/>;
                    return (
                      <div key={day.dateStr}
                        className={"cal-day"+(day.isToday?" is-today":"")+(day.hasWorkout?" has-workout":"")+(day.completed?" completed":"")+(selectedDay===day.dateStr?" selected-day":"")}
                        onClick={() => setSelectedDay(day.dateStr)}>
                        {day.d}
                        {day.hasWorkout && <div className="cal-dot"/>}
                      </div>
                    );
                  })}
                </div>
              );
            })()}

            <div className="day-detail">
              <div className="day-detail-title">📍 {formatDate(selectedDay)}</div>
              {dayWorkouts.length===0
                ? <div className="no-data">Aucune séance ce jour</div>
                : dayWorkouts.map(w => (
                  <div key={w.id} style={{ marginBottom:8 }}>
                    <div className="workout-type">{w.type}</div>
                    <div className="workout-stats-row" style={{ marginTop:6 }}>
                      {w.duration>0&&<div className="workout-stat"><div className="val">{w.duration}</div><div className="unit">MIN</div></div>}
                      {w.km>0&&<div className="workout-stat"><div className="val">{w.km}</div><div className="unit">KM</div></div>}
                      {w.calories>0&&<div className="workout-stat"><div className="val">{w.calories}</div><div className="unit">CAL</div></div>}
                    </div>
                    {w.notes&&<div className="workout-notes">"{w.notes}"</div>}
                  </div>
                ))
              }
            </div>

            <div className="card-title">🏆 Total cumulatif</div>
            <div className="stats-week">
              <div className="stat-box"><div className="val">{state.workouts.length}</div><div className="lbl">Séances</div></div>
              <div className="stat-box"><div className="val">{state.workouts.reduce((s,w)=>s+(w.km||0),0).toFixed(0)}</div><div className="lbl">KM Total</div></div>
              <div className="stat-box"><div className="val">{state.workouts.reduce((s,w)=>s+(w.calories||0),0)}</div><div className="lbl">Cal Total</div></div>
            </div>
          </>
        )}

        {/* ── TROPHÉES ── */}
        {tab === "trophies" && (
          <>
            <div className="card-title">⚡ Panthéon des Dieux</div>
            <div className="intro-box">
              Ton streak: <span style={{ color:"var(--blue-l)", fontWeight:700, fontSize:16 }}>{state.streak} jours 🔥</span><br/>
              {nextTrophy
                ? `Plus que ${nextTrophy.streak-state.streak} jours pour ${nextTrophy.name}!`
                : "Tu as tout débloqué — Chronos approuve!"}
            </div>
            <div className="trophies-grid">
              {TROPHIES.map(t => (
                <TrophyCard key={t.streak} trophy={t}
                  unlocked={state.unlockedTrophies.includes(t.streak)||state.streak>=t.streak}
                  current={currentTrophy?.streak===t.streak}/>
              ))}
            </div>
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(FitnessTracker));
  </script>
</body>
</html>
